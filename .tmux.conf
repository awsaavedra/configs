# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf

# rename current pane label (uses @pane-label, immune to shell overrides)
bind T command-prompt -p "Pane label:" "set -p @pane-label '%%'"

# disable new window creation (user request)
unbind c

# switch panes using Ctrl-hjkl without prefix (vim-style)
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R

# Enable mouse mode (tmux 2.1 and above)
set -g mouse on

# don't rename windows automatically
set-option -g allow-rename off

######################
### THEME ###
######################

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# loud or quiet?
set-option -g visual-activity off
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

# TokyoNight Moon theme
source-file ~/.config/tmux/themes/tokyonight_moon.tmux

######################
### PANE LABELS    ###
######################

# Show pane labels in top border for all windows.
# Uses @pane-label (a tmux user option) rather than pane_title so the shell
# prompt cannot override it. Default hint is set by pane-color.sh on creation.
set -g pane-border-status top
set -g pane-border-format " #{@pane-label} "

######################
### PANE COLORS    ###
######################

# Rotate pane background colors so each split gets a distinct dark hue.
# The script picks a color based on the pane's numeric ID.
set-hook -g after-new-session  "run-shell '$HOME/.config/tmux/pane-color.sh #{pane_id}'"
set-hook -g after-new-window   "run-shell '$HOME/.config/tmux/pane-color.sh #{pane_id}'"
set-hook -g after-split-window "run-shell '$HOME/.config/tmux/pane-color.sh #{pane_id}'"

######################
### EISENHOWER MATRIX ###
######################

# Eisenhower Matrix: prefix + E
#   ┌─────────────────┬──────────────────┐
#   │   Do  (Green)   │  Decide  (Blue)  │
#   ├─────────────────┼──────────────────┤
#   │ Delegate (Rose) │  Delete  (Grey)  │
#   └─────────────────┴──────────────────┘
#
# Splits 3 times then applies tiled layout so indices are:
#   0 = top-left, 1 = top-right, 2 = bottom-left, 3 = bottom-right
bind E new-window -n "Eisenhower" \; \
  split-window -v \; \
  split-window -v \; \
  split-window -v \; \
  select-layout tiled \; \
  select-pane -t .0 -P 'bg=colour65,fg=colour108' \; set -p -t .0 @pane-label " Do " \; \
  select-pane -t .1 -P 'bg=colour24,fg=colour110' \; set -p -t .1 @pane-label " Decide " \; \
  select-pane -t .2 -P 'bg=colour95,fg=colour181' \; set -p -t .2 @pane-label " Delegate " \; \
  select-pane -t .3 -P 'bg=colour60,fg=colour146' \; set -p -t .3 @pane-label " Delete " \; \
  select-pane -t 0
